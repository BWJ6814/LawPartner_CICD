services:
  backend:
    build:
      context: ./Backend-main
      dockerfile: Dockerfile
    container_name: lawpartner-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_AES256_KEY: ${ENCRYPTION_AES256_KEY}
      PORTONE_SECRET_KEY: ${PORTONE_SECRET_KEY}
      CHAT_FILE_UPLOAD_DIR: /data/chat_uploads
      CHAT_FILE_SERVER_URL: ${CHAT_FILE_SERVER_URL:-https://api.fourjolawpartner.com:443}
      FILE_UPLOAD_DIR: /data/lawyer-docs
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailpit}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-false}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      # Docker 네트워크 내 AI 서비스 (127.0.0.1은 백엔드 컨테이너 자기 자신을 가리켜 연결 실패함)
      PYTHON_CHAT_URL: ${PYTHON_CHAT_URL:-http://backend-ai:8000/chat}
      PYTHON_SUMMARIZE_URL: ${PYTHON_SUMMARIZE_URL:-http://backend-ai:8000/summarize-consult}
    volumes:
      - lawpartner_data:/data

  backend-ai:
    build:
      context: ./backend-ai
      dockerfile: Dockerfile
    container_name: lawpartner-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      RAG_DISABLE: ${RAG_DISABLE:-false}
    volumes:
      - ./backend-ai/faiss_db:/app/faiss_db

  mailpit:
    image: axllent/mailpit:latest
    container_name: lawpartner-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: lawpartner-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
      - mailpit

volumes:
  lawpartner_data:
