services:
  backend:
    # RDS·JWT 등은 .env.prod에만 두고, 아래 environment의 빈 ${VAR}가 env를 덮어쓰지 않도록 DB/비밀키는 여기서 지정하지 않음
    env_file:
      - .env.prod
    build:
      context: ./Backend-main
      dockerfile: Dockerfile
    container_name: lawpartner-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Seoul
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      CHAT_FILE_UPLOAD_DIR: /data/chat_uploads
      # 공개 API 베이스 — ${} 미사용(다른 도메인이면 .env.prod에 CHAT_FILE_SERVER_URL 추가 후 아래 줄 제거·조정)
      CHAT_FILE_SERVER_URL: "http://api.lawpartner.kro.kr"
      FILE_UPLOAD_DIR: /data/lawyer-docs
      # GeneralMyPageService @Value — Linux/Docker에서 필수 (없으면 빈 생성 실패 → 502)
      FILE_PROFILE_UPLOAD_DIR: ${FILE_PROFILE_UPLOAD_DIR:-/data/profile_uploads}
      # 리터럴( ${} 없음 ) — 셸 미설정 시에도 프론트 Origin 허용
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://lawpartner.kro.kr,http://www.lawpartner.kro.kr"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # 메일: ${…} 치환은 호스트의 .env + 셸 환경만 본다(.env.prod는 자동 미포함).
      # Gmail 등: `docker compose --env-file .env.prod -f docker-compose.prod.yml up -d` 로 실행하거나,
      # 프로젝트 루트 .env 에 SPRING_MAIL_* 를 두어 치환되게 할 것.
      # Spring이 읽는 키 이름은 반드시 아래 두 개(…MAIL_SMTP…) — 오타로 …PROPERTIES_SMTP… 만 쓰면 무시됨.
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailpit}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-${SPRING_MAIL_SMTP_AUTH:-false}}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-false}}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      # 전역 API 레이트 리밋 (IP당 분당). .env.prod 에서 조정. 기본 300.
      # 검증만 할 때: env.rate-limit-verify 내용을 .env.prod에 추가하거나 compose.override.rate-limit-verify.yml 사용
      APP_SECURITY_GLOBAL_RATE_LIMIT_PER_MINUTE: ${APP_SECURITY_GLOBAL_RATE_LIMIT_PER_MINUTE:-300}
      # Docker 네트워크 내 AI 서비스 (127.0.0.1은 백엔드 컨테이너 자기 자신을 가리켜 연결 실패함)
      PYTHON_CHAT_URL: ${PYTHON_CHAT_URL:-http://backend-ai:8000/chat}
      PYTHON_SUMMARIZE_URL: ${PYTHON_SUMMARIZE_URL:-http://backend-ai:8000/summarize-consult}
    volumes:
      - lawpartner_data:/data

  backend-ai:
    env_file:
      - .env.prod
    build:
      context: ./backend-ai
      dockerfile: Dockerfile
    container_name: lawpartner-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      RAG_DISABLE: ${RAG_DISABLE:-false}
      # FAISS 유사도 상위 N건 (판례 노출 개수)
      RAG_TOP_K: ${RAG_TOP_K:-2}
    volumes:
      - ./backend-ai/faiss_db:/app/faiss_db

  mailpit:
    image: axllent/mailpit:latest
    container_name: lawpartner-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: lawpartner-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
      - mailpit

volumes:
  lawpartner_data:
