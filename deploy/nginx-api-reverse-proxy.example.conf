# EC2 호스트 nginx에서 api.lawpartner.kro.kr → Spring Boot(8080) 로 프록시할 때 참고용 스니펫.
# 실제 경로는 배포 환경에 맞게 server { ... } 안에 포함하세요.
#
# 413 Request Entity Too Large → client_max_body_size 부족
# AI 상담 504 → proxy_read_timeout 부족 (백엔드는 최대 10분 대기 가능)

client_max_body_size 50m;

location /api/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 660s;
    proxy_read_timeout 660s;
}
