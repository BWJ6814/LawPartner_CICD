# 전역 레이트 리밋 검증용 (IP당 분당 5회 → 같은 출발지로 6번째 요청부터 403/SEC-429 기대)
#
# 사용 예:
#   docker compose -f docker-compose.prod.yml -f compose.override.rate-limit-verify.yml --env-file .env.prod up -d --build
#
# 검증 후 운영으로 되돌리려면: 이 override 없이 기존처럼만 실행하거나,
# .env.prod 에 APP_SECURITY_GLOBAL_RATE_LIMIT_PER_MINUTE=300 명시
#
services:
  backend:
    environment:
      APP_SECURITY_GLOBAL_RATE_LIMIT_PER_MINUTE: "5"
